experiment:
  name: baseline_mlp
  seed: 42
  description: Baseline mlp with default hyperparameters
data:
  dataset: fashion_mnist
  data_dir: ~/development/DS6050_G12_PROJECT/data
  train_size: 50000
  val_size: 10000
  test_size: 10000
  num_workers: 4
  augmentation: none
  normalize_mean: 0.286
  normalize_std: 0.353
model:
  type: mlp
training:
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.01
  momentum: 0.9
  batch_size: 128
  epochs: 50
  dropout: 0.3
  early_stopping:
    enabled: true
    patience: 5
    monitor: val_loss
    min_delta: 0.001
  initialization: he
logging:
  results_csv: ~/development/DS6050_G12_PROJECT/results/all_experiments.csv
  save_model: false
  save_curves: true
  curves_dir: ~/development/DS6050_G12_PROJECT/results/curves
hardware:
  device: auto
  log_gpu_memory: true
  log_flops: true
